[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    basic: Tests for basic piece movements
    special: Tests for special moves (castling, promotion, en passant)
    check: Tests for check and checkmate detection
    draw: Tests for draw and stalemate conditions
    fen: Tests for FEN import/export
    pgn: Tests for PGN generation
    history: Tests for move history and undo
    callback: Tests for event callbacks
    integration: Integration tests
    edge_case: Edge case tests
